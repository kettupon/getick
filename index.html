<script type="module">
    import { initializeApp }     from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey:            "AIzaSyBO5lPMU0LBdNOlnj-SsiiK2gWVDvegfeo",
        authDomain:        "billget-b4c17.firebaseapp.com",
        projectId:         "billget-b4c17",
        storageBucket:     "billget-b4c17.firebasestorage.app",
        messagingSenderId: "872727285554",
        appId:             "1:872727285554:web:d3ee2323d477e18fb7112b",
    };

    // Note: Use a specific app name to avoid conflicting with TICKET_MSTR
    const app  = initializeApp(firebaseConfig, "BillGetApp");
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ROOM_ID = "shared-global";

    let cards              = [];
    let bills              = {};
    let uid                = null;
    let currentTab         = 'dashboard';
    let dashFilter         = 'unpaid';
    let expandedMonths     = new Set();
    let editingCardId      = null;
    let selectedMonth      = new Date().getMonth() + 1;

    const MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    const YEARS  = [2024, 2025, 2026, 2027];

    let payCtx = { key: null, cardName: null, billMax: 0, dueDay: 1, monthName: '' };
    let payType = 'full';  
    let payTiming = 'ontime'; 

    function toast(msg, dur = 2200) {
        const el = document.getElementById('toast');
        el.innerText = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), dur);
    }

    async function setupPresence(userId) {
        const presRef = doc(db, 'rooms', ROOM_ID, 'presence', userId);
        await setDoc(presRef, { at: serverTimestamp() });

        onSnapshot(collection(db, 'rooms', ROOM_ID, 'presence'), snap => {
            const n = snap.size;
            document.getElementById('online-count').innerText = n === 1 ? 'แค่คุณคนเดียว' : `${n} คนออนไลน์`;
        });

        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon && navigator.sendBeacon('');
            deleteDoc(presRef).catch(() => {});
        });
    }

    function setupListeners() {
        setDoc(doc(db, 'rooms', ROOM_ID), { createdAt: serverTimestamp() }, { merge: true });
        onSnapshot(collection(db, 'rooms', ROOM_ID, 'cards'), snap => {
            cards = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
            renderAll();
        });

        onSnapshot(collection(db, 'rooms', ROOM_ID, 'bills'), snap => {
            bills = {};
            snap.docs.forEach(d => bills[d.id] = d.data());
            renderAll();
        });
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('shopee-orange'); b.classList.add('text-slate-400');
        });
        document.getElementById('nav-' + tab).classList.add('shopee-orange');
        document.getElementById('nav-' + tab).classList.remove('text-slate-400');
        renderAll();
    };

    window.switchDashboardView = (status) => {
        dashFilter = status;
        ['unpaid','paid'].forEach(s => {
            document.getElementById('tab-' + s).classList.toggle('tab-active', s === status);
            document.getElementById('tab-' + s).classList.toggle('text-slate-500', s !== status);
        });
        renderDashboard();
    };

    window.toggleMonth = (key) => { expandedMonths.has(key) ? expandedMonths.delete(key) : expandedMonths.add(key); renderDashboard(); };
    window.openOverview = () => { calcOverview(); document.getElementById('overview-modal').classList.remove('hidden'); };
    window.closeModal   = (id) => document.getElementById(id)?.classList.add('hidden');

    function calcOverview() {
        let unpaid = 0, paid = 0;
        const cy = new Date().getFullYear().toString();
        Object.keys(bills).forEach(k => {
            const [y] = k.split('-');
            Object.values(bills[k]).forEach(b => {
                if (!b.paid) unpaid += b.max || 0;
                else if (y === cy) paid += b.max || 0;
            });
        });
        document.getElementById('ov-total-unpaid').innerText = `฿${unpaid.toLocaleString()}`;
        document.getElementById('ov-total-paid').innerText   = `฿${paid.toLocaleString()}`;

        const ub = document.getElementById('usage-bars');
        ub.innerHTML = cards.length ? '' : '<p class="text-xs text-slate-300 italic text-center py-4">ยังไม่มีบัตร</p>';
        cards.forEach(card => {
            let used = 0;
            Object.keys(bills).sort().reverse().some(k => {
                if (bills[k][card.name]) { used = bills[k][card.name].max || 0; return true; }
            });
            const pct = card.limit > 0 ? Math.min(100, used / card.limit * 100) : 0;
            ub.innerHTML += `<div><div class="flex justify-between text-[11px] mb-1 font-medium"><span class="text-slate-600 font-semibold">${card.name}</span><span class="text-slate-400">${pct.toFixed(0)}% (${used.toLocaleString()} / ${card.limit.toLocaleString()})</span></div><div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-orange-500 rounded-full" style="width:${pct}%"></div></div></div>`;
        });

        const tb = document.getElementById('trend-bars');
        tb.innerHTML = '';
        const last6 = [];
        let t = new Date();
        for (let i = 0; i < 6; i++) {
            last6.unshift(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`);
            t.setMonth(t.getMonth() - 1);
        }
        const maxV = Math.max(...last6.map(k => bills[k] ? Object.values(bills[k]).reduce((s,b) => s+(b.max||0),0) : 0), 1000);
        last6.forEach(k => {
            const [,m] = k.split('-');
            const total = bills[k] ? Object.values(bills[k]).reduce((s,b) => s+(b.max||0),0) : 0;
            tb.innerHTML += `<div class="flex flex-col items-center flex-1 gap-1 h-full"><div class="w-full bg-orange-50 rounded-t-md relative flex flex-col justify-end min-h-[4px] h-full"><div class="w-full bg-orange-400 rounded-t-md" style="height:${(total/maxV)*100}%"></div></div><span class="text-[8px] font-bold text-slate-400">${MONTHS[parseInt(m)-1]}</span></div>`;
        });
    }

    function renderDashboard() {
        const list = document.getElementById('dashboard-month-list');
        if (!list) return;
        list.innerHTML = ''; let hasData = false;
        const now = new Date(); const nowKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

        const sorted = Object.keys(bills).sort((a, b) => {
            const future = (k) => k > nowKey;
            if (future(a) && future(b)) return a.localeCompare(b);
            if (!future(a) && !future(b)) return b.localeCompare(a); 
            return future(a) ? 1 : -1; 
        });

        const reordered = [];
        const curIdx = sorted.indexOf(nowKey);
        if (curIdx > -1) { reordered.push(nowKey); sorted.splice(curIdx, 1); }
        reordered.push(...sorted);

        reordered.forEach(dateKey => {
            const [year, month] = dateKey.split('-');
            const mName = MONTHS[parseInt(month)-1];
            const monthBills = Object.keys(bills[dateKey]).filter(cn => (dashFilter === 'paid') === !!bills[dateKey][cn].paid).map(cn => ({ cardName: cn, ...bills[dateKey][cn] }));
            if (!monthBills.length) return;
            hasData = true;

            const total = monthBills.reduce((s,b) => s+(b.max||0), 0);
            const expanded = expandedMonths.has(dateKey);
            const tag = dashFilter === 'paid' ? `<span class="status-tag-paid">ชำระครบ</span>` : `<span class="status-tag-unpaid">ค้าง ${monthBills.length} รายการ</span>`;
            const isCurrent = dateKey === nowKey;

            list.innerHTML += `<div class="bg-white shadow-sm border-b border-slate-50 overflow-hidden ${isCurrent ? 'border-l-4 border-l-orange-400' : ''}"><div class="month-card flex justify-between items-center p-4" onclick="toggleMonth('${dateKey}')"><div class="flex flex-col gap-1"><div class="flex items-center gap-2"><h4 class="text-[17px] font-medium text-slate-900">${mName} ${year}</h4>${isCurrent ? '<span class="text-[9px] font-bold text-orange-400 bg-orange-50 px-2 py-0.5 rounded-full border border-orange-200">เดือนนี้</span>' : ''}</div><div>${tag}</div></div><div class="flex items-center gap-2"><span class="text-[17px] font-semibold text-slate-900">฿${total.toLocaleString()}</span><i class="fas fa-chevron-down text-slate-300 text-[12px] transition-transform duration-300 ${expanded ? 'rotate-180' : ''}"></i></div></div><div class="${expanded ? 'max-h-[2000px]' : 'max-h-0'} transition-all duration-300 ease-in-out bg-slate-50/50">${monthBills.map(bill => {
                const hasPaidNote = bill.paid && bill.paidAmount != null;
                const timingLabel = bill.payTiming === 'late' ? '<span class="text-[9px] font-bold text-amber-500 bg-amber-50 px-1.5 py-0.5 rounded-full border border-amber-200">ช้ากว่ากำหนด</span>' : bill.payTiming === 'ontime' ? '<span class="text-[9px] font-bold text-emerald-500 bg-emerald-50 px-1.5 py-0.5 rounded-full border border-emerald-200">ตรงกำหนด</span>' : '';
                const paidDiff = hasPaidNote && bill.paidAmount !== bill.max ? `<span class="text-[9px] text-slate-400">(ต่างจากยอด ฿${Math.abs(bill.paidAmount - bill.max).toLocaleString()}${bill.paidAmount < bill.max ? ' น้อยกว่า' : ' มากกว่า'})</span>` : '';
                return `<div class="px-6 py-3 border-b border-white/50" onclick="event.stopPropagation(); handleTogglePaid('${dateKey}','${bill.cardName}')"><div class="flex justify-between items-center"><div class="flex flex-col"><span class="text-sm font-medium text-slate-700">${bill.cardName}</span><span class="text-[10px] text-slate-400">ครบกำหนด ${String(bill.actualDue||1).padStart(2,'0')} ${mName}</span></div><div class="flex items-center gap-3"><div class="text-right"><span class="text-sm font-medium text-slate-600">฿${(bill.max||0).toLocaleString()}</span>${hasPaidNote && bill.paidAmount !== bill.max ? `<div class="text-[10px] text-green-600 font-medium">จ่าย ฿${bill.paidAmount.toLocaleString()}</div>` : ''}</div><div class="w-5 h-5 rounded-full border flex items-center justify-center flex-shrink-0 ${bill.paid ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300'}">${bill.paid ? '<i class="fas fa-check text-[10px]"></i>' : ''}</div></div></div>${hasPaidNote ? `<div class="flex items-center gap-2 mt-1.5">${timingLabel}${paidDiff}</div>` : ''}</div>`;
            }).join('')}</div></div>`;
        });
        if (!hasData) list.innerHTML = `<div class="py-24 text-center opacity-30 flex flex-col items-center gap-4"><i class="fas fa-receipt text-6xl"></i><p class="text-sm font-medium text-slate-400 uppercase">ไม่มีข้อมูล${dashFilter === 'paid' ? 'ที่ชำระแล้ว' : 'ค้างชำระ'}</p></div>`;
    }

    window.handleTogglePaid = (key, cardName) => {
        const bill = bills[key]?.[cardName]; if (!bill) return;
        if (bill.paid) {
            const updated = { ...bills[key] };
            updated[cardName] = { ...updated[cardName], paid: false, paidAmount: null, payTiming: null };
            setDoc(doc(db, 'rooms', ROOM_ID, 'bills', key), updated);
            return;
        }
        const [year, month] = key.split('-'); const mName = MONTHS[parseInt(month)-1];
        payCtx = { key, cardName, billMax: bill.max || 0, dueDay: bill.actualDue || 1, monthName: `${mName} ${year}` };
        payType   = 'full'; payTiming = 'ontime';
        document.getElementById('pay-modal-title').innerText = `จ่าย ${cardName}`;
        document.getElementById('pay-modal-sub').innerText   = `ครบกำหนด ${String(payCtx.dueDay).padStart(2,'0')} ${payCtx.monthName}`;
        document.getElementById('pay-full-amt').innerText    = `฿${payCtx.billMax.toLocaleString()}`;
        document.getElementById('pay-amount-input').value   = '';
        document.getElementById('pay-custom-input').classList.add('hidden');
        highlightPayType(); highlightTiming();
        document.getElementById('pay-modal').classList.remove('hidden');
    };

    window.selectPayType = (type) => { payType = type; document.getElementById('pay-custom-input').classList.toggle('hidden', type !== 'custom'); if (type === 'custom') document.getElementById('pay-amount-input').focus(); highlightPayType(); };
    window.selectTiming = (t) => { payTiming = t; highlightTiming(); };

    function highlightPayType() {
        document.getElementById('pay-btn-full').className   = payType === 'full' ? 'py-3 rounded-xl border-2 border-green-400 bg-green-50 text-green-700 text-xs font-bold transition-all' : 'py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-500 text-xs font-bold transition-all';
        document.getElementById('pay-btn-custom').className = payType === 'custom' ? 'py-3 rounded-xl border-2 border-orange-400 bg-orange-50 text-orange-700 text-xs font-bold transition-all' : 'py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-500 text-xs font-bold transition-all';
    }

    function highlightTiming() {
        document.getElementById('timing-btn-ontime').className   = payTiming === 'ontime' ? 'py-3 rounded-xl border-2 border-emerald-400 bg-emerald-50 text-emerald-700 text-xs font-bold transition-all' : 'py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-500 text-xs font-bold transition-all';
        document.getElementById('timing-btn-late').className = payTiming === 'late' ? 'py-3 rounded-xl border-2 border-amber-400 bg-amber-50 text-amber-700 text-xs font-bold transition-all' : 'py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-500 text-xs font-bold transition-all';
    }

    window.cancelPayModal = () => document.getElementById('pay-modal').classList.add('hidden');
    window.confirmPayModal = async () => {
        const { key, cardName, billMax } = payCtx;
        const paidAmount = payType === 'full' ? billMax : parseFloat(document.getElementById('pay-amount-input').value) || 0;
        const updated = { ...bills[key] };
        updated[cardName] = { ...updated[cardName], paid: true, paidAmount, payTiming };
        await setDoc(doc(db, 'rooms', ROOM_ID, 'bills', key), updated);
        document.getElementById('pay-modal').classList.add('hidden');
        toast(`บันทึก ฿${paidAmount.toLocaleString()} ${payTiming === 'late' ? '(ช้ากว่ากำหนด)' : '(ตรงกำหนด)'} ✓`);
    };

    function renderCardList() {
        const list = document.getElementById('card-list'); if (!list) return;
        list.innerHTML = cards.length ? '' : '<div class="py-20 text-center opacity-30 text-xs font-medium uppercase tracking-widest">ยังไม่มีบัตร</div>';
        cards.forEach(card => {
            list.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-start"><div><h4 class="font-bold text-slate-800 text-lg">${card.name}</h4><div class="text-[12px] text-slate-400 mt-1 space-y-0.5"><p>วงเงิน: ฿${(card.limit||0).toLocaleString()}</p><p>ตัดรอบวันที่: ${card.cycle} | จ่ายวันที่: ${card.due}</p></div></div><div class="flex gap-4"><button onclick="openModal('card-modal','${card.id}')" class="text-slate-300 hover:text-orange-400"><i class="fas fa-edit"></i></button><button onclick="handleDeleteCard('${card.id}')" class="text-slate-300 hover:text-red-400"><i class="fas fa-trash"></i></button></div></div>`;
        });
    }

    window.openModal = (id, cardId = null) => {
        editingCardId = cardId;
        if (cardId) {
            const c = cards.find(c => c.id === cardId);
            if (c) {
                document.getElementById('m-card-name').value  = c.name; document.getElementById('m-card-limit').value = c.limit;
                document.getElementById('m-card-cycle').value = c.cycle; document.getElementById('m-card-due').value   = c.due;
            }
        } else { ['m-card-name','m-card-limit','m-card-cycle','m-card-due'].forEach(f => { const el = document.getElementById(f); if (el) el.value = ''; }); }
        document.getElementById(id).classList.remove('hidden');
    };

    window.handleSaveCard = async () => {
        const name  = document.getElementById('m-card-name').value.trim(); const limit = parseFloat(document.getElementById('m-card-limit').value) || 0;
        const cycle = parseInt(document.getElementById('m-card-cycle').value)   || 1; const due   = parseInt(document.getElementById('m-card-due').value)     || 1;
        if (!name) { toast('กรุณากรอกชื่อบัตร'); return; }
        const cardId = editingCardId || crypto.randomUUID();
        await setDoc(doc(db, 'rooms', ROOM_ID, 'cards', cardId), { name, limit, cycle, due, order: Date.now() });
        closeModal('card-modal'); toast('บันทึกบัตรแล้ว ✓');
    };

    window.handleDeleteCard = async (cardId) => { if (!confirm('ลบบัตรนี้?')) return; await deleteDoc(doc(db, 'rooms', ROOM_ID, 'cards', cardId)); toast('ลบบัตรแล้ว'); };

    window.renderBillList = renderBillList;
    function renderBillList() {
        const yearSel = document.getElementById('entry-year'); const year    = yearSel?.value || new Date().getFullYear();
        const month   = String(selectedMonth).padStart(2, '0'); const key     = `${year}-${month}`;
        const list    = document.getElementById('bill-entry-list'); if (!list) return;
        list.innerHTML = '';
        if (!cards.length) { list.innerHTML = '<div class="py-20 text-center opacity-30 text-xs font-bold uppercase tracking-widest text-slate-400">กรุณาเพิ่มบัตรก่อนลงยอด</div>'; return; }
        cards.forEach(card => {
            const b = bills[key]?.[card.name] || { max: 0, actualDue: card.due, paid: false };
            const hasAmount = (b.max || 0) > 0; const isFull    = hasAmount && b.paid;
            const stateClass = isFull ? 'bill-card-full' : hasAmount ? 'bill-card-partial' : '';
            const el = document.createElement('div');
            el.className = `bg-white p-5 rounded-2xl border border-slate-100 shadow-sm ${stateClass}`;
            el.innerHTML = `<div class="flex justify-between items-center mb-4"><p class="font-bold text-slate-800">${card.name}</p><div class="flex items-center gap-2 px-3 py-1 bg-slate-50 rounded-full border border-slate-100"><span class="text-[10px] font-bold text-slate-400">วันจ่ายจริง:</span><input type="number" value="${b.actualDue}" class="actual-due-input w-6 bg-transparent text-xs font-bold shopee-orange outline-none text-center"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">ยอดที่ใช้ (฿)</label><input type="number" value="${b.max||''}" placeholder="0.00" class="max-input w-full border-b border-slate-200 py-1 text-lg font-bold outline-none focus:border-orange-500"></div><div class="flex items-center justify-end pt-3"><label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer select-none"><input type="checkbox" ${b.paid?'checked':''} class="paid-check w-4 h-4 accent-orange-500">ชำระแล้ว</label></div></div>`;
            el.querySelector('.actual-due-input').onchange = e => saveBill(card.name, 'actualDue', e.target.value);
            el.querySelector('.max-input').onchange        = e => saveBill(card.name, 'max',       e.target.value);
            el.querySelector('.paid-check').onchange       = e => {
                if (e.target.checked) {
                    e.target.checked = false;
                    const year  = document.getElementById('entry-year')?.value || new Date().getFullYear();
                    const month = String(selectedMonth).padStart(2, '0');
                    handleTogglePaid(`${year}-${month}`, card.name);
                } else { saveBill(card.name, 'paid', false); }
            };
            list.appendChild(el);
        });
    }

    async function saveBill(cardName, field, value) {
        const year  = document.getElementById('entry-year')?.value || new Date().getFullYear();
        const month = String(selectedMonth).padStart(2, '0'); const key   = `${year}-${month}`;
        const updated = bills[key] ? { ...bills[key] } : {};
        if (!updated[cardName]) { const card = cards.find(c => c.name === cardName); updated[cardName] = { max: 0, actualDue: card?.due || 1, paid: false }; }
        if      (field === 'paid')      updated[cardName].paid      = value;
        else if (field === 'actualDue') updated[cardName].actualDue = parseInt(value) || 1;
        else                            updated[cardName].max       = parseFloat(value) || 0;
        await setDoc(doc(db, 'rooms', ROOM_ID, 'bills', key), updated);
    }

    function renderAll() {
        if      (currentTab === 'dashboard') renderDashboard();
        else if (currentTab === 'cards')     renderCardList();
        else if (currentTab === 'bills')     { renderMonthSelect(); renderBillList(); }
    }

    function initYearSelector() {
        const sel = document.getElementById('entry-year'); if (!sel) return; sel.innerHTML = '';
        YEARS.forEach(y => { const opt = document.createElement('option'); opt.value = y; opt.innerText = y; if (y === new Date().getFullYear()) opt.selected = true; sel.appendChild(opt); });
    }

    function renderMonthSelect() {
        const yearSel = document.getElementById('entry-year'); const year    = yearSel?.value || new Date().getFullYear();
        const c = document.getElementById('month-quick-select'); if (!c) return; c.innerHTML = '';
        MONTHS.forEach((m, i) => {
            const n   = i + 1; const key = `${year}-${String(n).padStart(2,'0')}`; const monthData = bills[key] || {};
            let hasAny  = false; let allFull = false;
            if (cards.length > 0) { const filled = cards.filter(card => (monthData[card.name]?.max || 0) > 0); hasAny  = filled.length > 0; allFull = filled.length === cards.length; }
            const isSelected = selectedMonth === n; let extraClass = '';
            if (!isSelected) { if (allFull && hasAny) extraClass = 'month-btn-full'; else if (hasAny)       extraClass = 'month-btn-partial'; }
            const btn = document.createElement('button'); btn.innerText = m; btn.className = `month-btn ${isSelected ? 'month-btn-active' : extraClass}`;
            btn.onclick   = () => { selectedMonth = n; renderMonthSelect(); renderBillList(); };
            c.appendChild(btn);
        });
    }

    initYearSelector(); renderMonthSelect();

    signInAnonymously(auth).catch(err => {
        console.error('Auth failed:', err);
        document.getElementById('loading-overlay').innerHTML = `
            <div class="text-center p-8">
                <i class="fas fa-exclamation-triangle text-4xl text-orange-400 mb-4"></i>
                <p class="font-bold text-slate-700 mb-2">เชื่อมต่อไม่ได้</p>
                <p class="text-xs text-slate-400 mb-4">กรุณาเปิด Anonymous Auth ใน Firebase Console</p>
                <button onclick="location.reload()" class="px-6 py-2 shopee-bg-orange text-white rounded-full text-sm font-bold">ลองใหม่</button>
            </div>`;
    });

    onAuthStateChanged(auth, async (u) => {
        if (!u) return; uid = u.uid;
        setupListeners(); await setupPresence(uid);
        document.getElementById('loading-overlay').style.display = 'none';
    });
</script>

</body>
</html>
